<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Pesanan PO</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-4">
<div class="container" style="max-width:600px;">
  <div class="card shadow">
    <div class="card-header bg-success text-white text-center">
      <h4>📝 Form Pesanan Barang</h4>
    </div>
    <div class="card-body">
      <form id="formPesanan">
        <div class="mb-3">
          <label>Nama Lengkap</label>
          <input type="text" id="nama" class="form-control" required>
        </div>
        <div class="mb-3">
          <label>No HP Aktif</label>
          <input type="tel" id="no_hp" class="form-control" required>
        </div>
        <div class="mb-3">
          <label>Alamat Lengkap Pengiriman</label>
          <textarea id="alamat" class="form-control" rows="2" required placeholder="Jalan, RT/RW, Kecamatan, Kota"></textarea>
        </div>
        <hr>
        <h5>🛒 Pilih Barang</h5>
        <div id="list-barang">
          <div class="row mb-2">
            <div class="col-7">
              <select class="form-select barang" required>
                <option value="">-- Pilih Barang --</option>
                <option value="Kabel HDMI 10m - Rp 75.000">Kabel HDMI 10m - Rp 75.000</option>
                <option value="Power Supply 12V 5A - Rp 45.000">Power Supply 12V 5A - Rp 45.000</option>
                <option value="Obeng Set Teknisi - Rp 120.000">Obeng Set Teknisi - Rp 120.000</option>
              </select>
            </div>
            <div class="col-3">
              <input type="number" class="form-control jumlah" min="1" value="1" required placeholder="Jml">
            </div>
            <div class="col-2">
              <button type="button" class="btn btn-danger btn-sm hapus">×</button>
            </div>
          </div>
        </div>
        <button type="button" id="tambah" class="btn btn-sm btn-secondary mb-3">+ Tambah Barang</button>
        <div class="mb-3">
          <label>🚚 Ongkir (Info dari penjual)</label>
          <input type="text" id="ongkir" class="form-control" placeholder="Contoh: 15000" required>
        </div>
        <button type="submit" class="btn btn-success w-100 py-2">📲 Kirim ke WA</button>
      </form>
    </div>
  </div>
</div>

<script>
// GANTI KE NOMOR WA LU (AWALAN 62, TANPA ANGKA 0 DEPAN)
const nomorWA = "6281234567890";

document.getElementById('tambah').onclick = function(){
  let el = document.querySelector('#list-barang > div').cloneNode(true);
  el.querySelectorAll('select, input').forEach(i => i.value = i.type=='number' ? 1 : '');
  document.getElementById('list-barang').appendChild(el);
};

document.addEventListener('click', e => e.target.classList.contains('hapus') && e.target.parentElement.remove());

document.getElementById('formPesanan').onsubmit = function(e){
  e.preventDefault();
  let nama = document.getElementById('nama').value;
  let hp = document.getElementById('no_hp').value;
  let alamat = document.getElementById('alamat').value;
  let ongkir = document.getElementById('ongkir').value;
  let barangList = "";
  document.querySelectorAll('.barang').forEach((sel, i) => {
    if(sel.value) barangList += `- ${document.querySelectorAll('.jumlah')[i].value}x ${sel.value}\n`;
  });
  let pesan = `🔔 PESANAN BARU
Nama: ${nama}
HP: ${hp}
Alamat: ${alamat}

Barang:
${barangList}
Ongkir: Rp ${ongkir}`;
  window.open(`https://wa.me/${nomorWA}?text=${encodeURIComponent(pesan)}`, '_blank');
};
</script>
</body>
</html>
