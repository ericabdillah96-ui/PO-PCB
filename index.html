<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Pesanan PCB WAVEID V2</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .marquee {
      background: #ffc107;
      color: #000;
      padding: 8px;
      font-weight: bold;
      text-align: center;
      overflow: hidden;
      white-space: nowrap;
    }
    .marquee span {
      display: inline-block;
      animation: jalan 20s linear infinite; /* ⏩ Diperlambat jadi 20 detik */
    }
    @keyframes jalan {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
  </style>
</head>
<body class="bg-light py-4">

  <!-- 📢 TULISAN BERJALAN SUDAH DIGANTI & DIPERLAMBAT -->
  <div class="marquee">
    <span>🔥 OPEN PO PCB WAVEID V2 </span>
  </div>

<div class="container mt-3" style="max-width:550px;">
  <div class="card shadow">
    <div class="card-header bg-dark text-white text-center">
      <h4>📝 Pesanan PCB WAVEID V2</h4>
    </div>
    <div class="card-body">
      <form id="formPesanan">
        <div class="mb-3">
          <label>Nama Lengkap</label>
          <input type="text" id="nama" class="form-control" required>
        </div>
        <div class="mb-3">
          <label>No HP Aktif</label>
          <input type="tel" id="no_hp" class="form-control" required>
        </div>
        <div class="mb-3">
          <label>Alamat Lengkap Pengiriman</label>
          <textarea id="alamat" class="form-control" rows="2" required placeholder="Jalan, RT/RW, Kecamatan, Kota"></textarea>
        </div>

        <hr>
        <div class="alert alert-info text-center">
          <strong>Barang: PCB WAVEID V2</strong><br>
          Harga: Rp 35.000 / pcs<br>
          <small>MAKSIMAL PRMBELIAN 2 PCS</small>
        </div>

        <div class="mb-3">
          <label>Jumlah Pesanan</label>
          <select id="jumlah" class="form-select" required>
            <option value="">-- Pilih Jumlah --</option>
            <option value="1">1 Pcs - Rp 35.000</option>
            <option value="2">2 Pcs - Rp 70.000</option>
          </select>
        </div>

        <div class="alert alert-warning text-center py-2">
           ⚠️ CATATAN : HARGA DI ATAS <strong>BELUM TERMASUKI ONGKIR</strong>
           ⚠️<strong>TRANSFER HANYA KE 1 ADMIN<strong></strong>
        </div>

        <button type="submit" class="btn btn-success w-100 py-2">📲 Kirim Pesanan ke WA</button>
      </form>
    </div>
  </div>
</div>

<script>
const nomorWA = "6282175988678";

document.getElementById('formPesanan').onsubmit = function(e){
  e.preventDefault();
  let nama = document.getElementById('nama').value;
  let hp = document.getElementById('no_hp').value;
  let alamat = document.getElementById('alamat').value;
  let jumlah = document.getElementById('jumlah').value;
  let total = jumlah * 35000;

  let pesan = `🔔 *PESANAN BARU PCB WAVEID V2*
👤 Nama: ${nama}
📞 No HP: ${hp}
📍 Alamat: ${alamat}

📦 Pesanan: ${jumlah} Pcs PCB WAVEID V2
💰 Total Harga: Rp ${total.toLocaleString('id-ID')}

⚠️ Catatan: Harga belum termasuk ongkir, ongkir dibayar saat terima barang ya.

Terima kasih!`;

  window.open(`https://wa.me/${nomorWA}?text=${encodeURIComponent(pesan)}`, '_blank');
};
</script>
</body>
</html>
